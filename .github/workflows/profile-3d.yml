name: GitHub-Profile-3D-Contrib

on:
  schedule:
    # Tous les jours à 03h00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          # PAT_3D (token personnel) permet d'inclure les contributions privées
          GITHUB_TOKEN: ${{ secrets.PAT_3D || secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Remove language pie chart
        run: python3 .github/scripts/remove-pie.py
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "generate 3d contribution calendar" || echo "no changes"
          git push
